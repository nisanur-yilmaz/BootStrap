      margin-right: 10px;
    }

    .headerli a:hover {

    .container {
      text-align: center;
      margin: 50px;
    }

    .search-area {
      background: #fff;
      display: flex;
      border: 1px solid #dfe1e5;
      box-shadow: none;
      z-index: 3;
      height: 44px;
      margin: 0 auto;
      margin-top: -77px;
      width: 480px;
      border-radius: 24px;
    }

    .search-area:hover {
      box-shadow: 0 2px 3px 0 rgba(0, 0, 0, 0.24), 0 2px 5px 0 rgba(0, 0, 0, 0.19);
    }

    .search {
      flex: 1;
      display: flex;
      padding: 5px 8px 0 16px;
      padding-left: 14px;
    }

    .search-img {
      display: flex;
      align-items: center;
      padding-right: 13px;
      margin-top: -5px;
    }

    .search-img span {
      color: #9aa0a6;
      height: 20px;
      width: 20px;
      margin-top: 0px;
      display: inline-block;
      fill: currentColor;
      line-height: 24px;
      position: relative;
    }

    .input-enter {
      display: flex;
      flex: 1;
      flex-wrap: wrap;
      align-items: center;
    }

    .input-area {
      flex: 1;
      display: flex;
      align-items: center;
    }

    .input {
      flex: 1;
      margin: 0;
      padding: 0;
      color: rgba(0, 0, 0, 0.87);
      word-wrap: break-word;
      outline: none;
      font: 16px arial, sans-serif;
      line-height: 34px;
      height: 34px !important;
      text-rendering: auto;
      letter-spacing: normal;
      word-spacing: normal;
      text-transform: none;
      text-indent: 0px;
      text-shadow: none;
      text-align: start;
      appearance: textfield;
      cursor: text;
      border-radius: 20px;
      border: #b8b8b8;
    }

    .search-img1 {
      display: flex;
      align-items: center;
      padding-right: 13px;
      margin-top: -5px;
    }

    .search-img1 img {
      width: 25px;
      height: 25px;
    }

    .googlesearch {
      margin: 20px 4px;
      color: #70757a ;
      padding: 0 16px;
      line-height: 27px;
      min-width: 54px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      border: #b8b8b8;
      font-weight:1px  #f2f2f2 ;
      height: 36px;
      font-family: Arial, Helvetica, sans-serif;
      font-size:  14px;
    }

    .feelinglucky {
      padding: 0 16px;
      color:  #70757a;;

      min-width: 54px;
      text-align: center;
      cursor: pointer;

      border: #b8b8b8;
      font-weight:1px  #f2f2f2 ;
      height: 36px;
      font-family: Arial, Helvetica, sans-serif;

      padding: 0;

      border: 1px solid #dfe1e5;
      border-top: 1px solid #dadce0;
      position: fixed;
      bottom: 0;
      width: 100%;
      margin-left: -8px;
      line-height: 10px;
      background-color: #f2f2f2;
      font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;


    }
    li
    {
      list-style: none;
    }


    .footerli {
      float: left;
    }

    .footerli a {
      display: block;
      color: #70757a;
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
      font-family: arial, sans-serif;
      font-size: 14px;
      margin-left: 14px;
      margin-right: -20px;
    }

    .footerli a:hover {
      text-decoration: underline;
    }

    .buttons {
      text-align: center;
      margin-top: 10px;
    }
